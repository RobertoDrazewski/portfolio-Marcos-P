<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Marcos Ponce | IT Support Analyst Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
      /* Evita el scroll horizontal y asegura que el fondo sea oscuro desde el segundo cero */
      body {
        margin: 0;
        padding: 0;
        background-color: #030712; /* El mismo color dark de tu App.jsx */
        overflow-x: hidden;
      }
      
      /* Reset básico para que todo se vea igual en todos los navegadores */
      * {
        box-sizing: border-box;
      }

      /* Personalización de la barra de scroll para que sea Dark también */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #030712;
      }
      ::-webkit-scrollbar-thumb {
        background: #1f2937;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3b82f6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
